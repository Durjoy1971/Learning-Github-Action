name: second-event-triggers

on:
  push:
    branches:
      - prod
    paths:
      - 'src/**'
  pull_request:
    branches:
      - prod
  workflow_dispatch:

jobs:
  show-event:
    runs-on: ubuntu-latest
    steps:
      - name: Show event name
        run: echo "Triggered by ${{ github.event_name }}"

      - name: Show branch
        run: echo "Branch is ${{ github.ref_name }}"